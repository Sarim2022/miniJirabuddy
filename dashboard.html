<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="miniJira dashboard">
    <title>miniJira Home</title>
    <style>
      :root {
        color-scheme: light;
        --nav: #1672f1;
        --nav-deep: #0f5ecf;
        --text: #0b1220;
        --muted: rgba(11, 18, 32, 0.62);
        --panel: rgba(255, 255, 255, 0.84);
        --panel-strong: rgba(255, 255, 255, 0.96);
        --border: rgba(15, 23, 42, 0.08);
        --shadow: 0 24px 60px rgba(15, 23, 42, 0.12);
        --soft-bg: rgba(248, 251, 255, 0.78);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        min-height: 100%;
      }

      body {
        margin: 0;
        min-height: 100svh;
        font-family: "Avenir Next", "Segoe UI", "Trebuchet MS", sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at top left, rgba(255, 255, 255, 1), rgba(245, 249, 255, 0.98) 38%, #eef4ff 100%);
      }

      .app {
        min-height: 100svh;
        display: grid;
        grid-template-rows: auto 1fr;
      }

      .topbar {
        position: sticky;
        top: 0;
        z-index: 20;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        min-height: 76px;
        padding: 14px clamp(16px, 3vw, 32px);
        background: linear-gradient(90deg, var(--nav-deep), var(--nav));
        color: #fff;
        box-shadow: 0 12px 28px rgba(22, 114, 241, 0.24);
      }

      .home-link {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        color: #fff;
        text-decoration: none;
        font-size: 1.08rem;
        font-weight: 800;
        white-space: nowrap;
      }

      .home-mark {
        width: 12px;
        height: 12px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.96);
        box-shadow: 0 0 0 6px rgba(255, 255, 255, 0.15);
      }

      .top-actions {
        display: flex;
        align-items: center;
        justify-content: flex-end;
        gap: 10px;
        flex-wrap: wrap;
      }

      .action-btn,
      .icon-btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 42px;
        border: 0;
        border-radius: 999px;
        cursor: pointer;
        transition: transform 0.18s ease, background 0.18s ease, opacity 0.18s ease;
      }

      .action-btn {
        padding: 0 16px;
        background: rgba(255, 255, 255, 0.14);
        color: #fff;
        font-weight: 700;
        border: 1px solid rgba(255, 255, 255, 0.1);
      }

      .action-btn:hover,
      .icon-btn:hover {
        transform: translateY(-1px);
        background: rgba(255, 255, 255, 0.22);
      }

      .account {
        width: 44px;
        height: 44px;
        border-radius: 50%;
        object-fit: cover;
        background: rgba(255, 255, 255, 0.18);
        border: 2px solid rgba(255, 255, 255, 0.9);
        box-shadow: 0 10px 20px rgba(0, 0, 0, 0.12);
      }

      .icon-btn {
        width: 44px;
        background: rgba(255, 255, 255, 0.14);
        border: 1px solid rgba(255, 255, 255, 0.1);
      }

      .icon-btn img {
        width: 22px;
        height: 22px;
        display: block;
        object-fit: contain;
      }

      .workspace {
        display: grid;
        grid-template-columns: minmax(240px, 280px) minmax(0, 1fr);
        gap: 18px;
        padding: 18px;
      }

      .panel {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 30px;
        box-shadow: var(--shadow);
        backdrop-filter: blur(16px);
      }

      .sidebar {
        display: flex;
        flex-direction: column;
        gap: 16px;
        padding: 18px;
      }

      .sidebar-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
      }

      .sidebar-title {
        margin: 0;
        font-size: 0.8rem;
        text-transform: uppercase;
        letter-spacing: 0.16em;
        color: var(--muted);
      }

      .space-count {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 32px;
        min-height: 32px;
        padding: 0 10px;
        border-radius: 999px;
        background: rgba(22, 114, 241, 0.1);
        color: var(--nav-deep);
        font-weight: 800;
      }

      .space-list {
        display: grid;
        gap: 10px;
      }

      .space-item,
      .space-empty {
        width: 100%;
        border: 1px solid transparent;
        border-radius: 20px;
        text-align: left;
      }

      .space-item {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 14px 15px;
        background: rgba(255, 255, 255, 0.72);
        color: var(--text);
        cursor: pointer;
        transition: transform 0.18s ease, background 0.18s ease, border-color 0.18s ease;
      }

      .space-item:hover {
        transform: translateY(-1px);
        background: rgba(255, 255, 255, 0.95);
        border-color: rgba(22, 114, 241, 0.18);
      }

      .space-item.active {
        background: linear-gradient(135deg, rgba(22, 114, 241, 0.96), rgba(15, 94, 207, 0.96));
        color: #fff;
        box-shadow: 0 12px 24px rgba(22, 114, 241, 0.2);
      }

      .space-item strong {
        display: block;
        font-size: 0.98rem;
        line-height: 1.35;
      }

      .space-item span {
        display: block;
        font-size: 0.84rem;
        color: inherit;
        opacity: 0.8;
      }

      .space-empty {
        padding: 14px 15px;
        background: rgba(255, 255, 255, 0.58);
        color: var(--muted);
      }

      .board {
        display: grid;
        gap: 18px;
        padding: 18px;
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.94), rgba(248, 251, 255, 0.88)),
          var(--soft-bg);
      }

      .board-head {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 12px;
      }

      .board-copy {
        min-width: 0;
      }

      .board-kicker {
        margin: 0 0 8px;
        font-size: 0.78rem;
        text-transform: uppercase;
        letter-spacing: 0.18em;
        color: var(--muted);
      }

      .board-title {
        margin: 0;
        font-size: clamp(2rem, 4vw, 3.6rem);
        line-height: 0.98;
        letter-spacing: -0.06em;
        font-weight: 900;
        color: #050505;
      }

      .board-meta {
        margin: 10px 0 0;
        color: var(--muted);
        line-height: 1.6;
      }

      .board-nav {
        display: flex;
        align-items: center;
        gap: 18px;
        flex-wrap: wrap;
        padding: 2px 0 8px;
        border-bottom: 1px solid rgba(15, 23, 42, 0.08);
      }

      .board-nav-item {
        padding: 10px 2px 12px;
        border: 0;
        border-bottom: 2px solid transparent;
        background: transparent;
        color: var(--muted);
        font: inherit;
        font-weight: 700;
        letter-spacing: 0.01em;
        cursor: pointer;
        transition: color 0.18s ease, border-color 0.18s ease, background 0.18s ease, transform 0.18s ease;
      }

      .board-nav-item:hover {
        color: var(--nav-deep);
        transform: translateY(-1px);
      }

      .board-nav-item.active {
        color: var(--nav-deep);
        border-bottom-color: var(--nav);
        background: rgba(22, 114, 241, 0.06);
      }

      .board-nav-item:focus-visible {
        outline: none;
        color: var(--nav-deep);
        box-shadow: inset 0 -2px 0 var(--nav);
      }

      .task-list {
        display: grid;
        gap: 10px;
        flex: 1;
      }

      .task-card {
        display: grid;
        gap: 10px;
        padding: 14px;
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.94);
        border: 1px solid rgba(15, 23, 42, 0.08);
        box-shadow: 0 12px 26px rgba(15, 23, 42, 0.08);
      }

      .task-card-head {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 10px;
      }

      .task-card-title {
        margin: 0;
        font-size: 0.98rem;
        line-height: 1.35;
        color: var(--text);
      }

      .task-badge {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 28px;
        padding: 0 10px;
        border-radius: 999px;
        background: rgba(22, 114, 241, 0.08);
        color: var(--nav-deep);
        font-size: 0.75rem;
        font-weight: 800;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        white-space: nowrap;
      }

      .task-badge.priority-low {
        background: rgba(34, 197, 94, 0.1);
        color: #15803d;
      }

      .task-badge.priority-medium {
        background: rgba(245, 158, 11, 0.12);
        color: #b45309;
      }

      .task-badge.priority-high {
        background: rgba(239, 68, 68, 0.1);
        color: #b91c1c;
      }

      .task-meta {
        display: grid;
        gap: 4px;
        font-size: 0.85rem;
        color: var(--muted);
        line-height: 1.45;
      }

      .task-meta strong {
        color: var(--text);
      }

      .project-toolbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        flex-wrap: wrap;
      }

      .project-actions {
        display: flex;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
      }

      .project-btn,
      .project-btn-primary {
        min-height: 40px;
        padding: 0 14px;
        border-radius: 999px;
        border: 1px solid transparent;
        cursor: pointer;
        font: inherit;
        font-weight: 800;
        transition: transform 0.18s ease, background 0.18s ease, color 0.18s ease, border-color 0.18s ease;
      }

      .project-btn {
        background: rgba(15, 23, 42, 0.06);
        color: var(--text);
        border-color: rgba(15, 23, 42, 0.08);
      }

      .project-btn-primary {
        background: linear-gradient(135deg, var(--nav-deep), var(--nav));
        color: #fff;
        box-shadow: 0 12px 24px rgba(22, 114, 241, 0.18);
      }

      .project-btn:hover,
      .project-btn-primary:hover {
        transform: translateY(-1px);
      }

      .code-pill {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 42px;
        padding: 0 14px;
        border-radius: 999px;
        background: rgba(22, 114, 241, 0.08);
        border: 1px solid rgba(22, 114, 241, 0.14);
        color: var(--nav-deep);
        font-size: 0.92rem;
        font-weight: 800;
        letter-spacing: 0.12em;
        white-space: nowrap;
      }

      .kanban {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 12px;
      }

      .lane {
        display: flex;
        flex-direction: column;
        gap: 12px;
        min-height: 480px;
        padding: 14px;
        border-radius: 24px;
        background: rgba(255, 255, 255, 0.72);
        border: 1px solid rgba(15, 23, 42, 0.08);
      }

      .lane h3 {
        margin: 0;
        font-size: 0.86rem;
        text-transform: uppercase;
        letter-spacing: 0.14em;
        color: var(--muted);
      }

      .lane-empty {
        margin-top: auto;
        padding: 16px 14px;
        border: 1px dashed rgba(15, 23, 42, 0.12);
        border-radius: 18px;
        background: rgba(248, 251, 255, 0.9);
        color: var(--muted);
        text-align: center;
        line-height: 1.5;
      }

      .modal {
        position: fixed;
        inset: 0;
        z-index: 40;
        display: grid;
        place-items: center;
        padding: 16px;
        background: rgba(8, 15, 28, 0.56);
      }

      .modal[hidden] {
        display: none;
      }

      .modal-card {
        width: min(520px, 100%);
        border-radius: 28px;
        background: rgba(255, 255, 255, 0.98);
        border: 1px solid rgba(15, 23, 42, 0.08);
        box-shadow: 0 30px 80px rgba(15, 23, 42, 0.2);
        padding: 22px;
      }

      .modal-head {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 18px;
      }

      .modal-head h2 {
        margin: 0;
        font-size: 1.4rem;
        letter-spacing: -0.04em;
      }

      .close-btn {
        width: 40px;
        height: 40px;
        border: 0;
        border-radius: 50%;
        cursor: pointer;
        background: rgba(15, 23, 42, 0.06);
        color: var(--text);
        font-size: 1.2rem;
        line-height: 1;
      }

      .space-form {
        display: grid;
        gap: 14px;
      }

      .field {
        display: grid;
        gap: 8px;
      }

      .field label {
        font-size: 0.92rem;
        font-weight: 700;
        color: var(--text);
      }

      .field input {
        min-height: 48px;
        padding: 0 16px;
        border-radius: 16px;
        border: 1px solid rgba(15, 23, 42, 0.12);
        background: #fff;
        color: var(--text);
        font: inherit;
        outline: none;
      }

      .field select {
        min-height: 48px;
        padding: 0 16px;
        border-radius: 16px;
        border: 1px solid rgba(15, 23, 42, 0.12);
        background: #fff;
        color: var(--text);
        font: inherit;
        outline: none;
      }

      .field input:focus {
        border-color: rgba(22, 114, 241, 0.46);
        box-shadow: 0 0 0 4px rgba(22, 114, 241, 0.12);
      }

      .field select:focus {
        border-color: rgba(22, 114, 241, 0.46);
        box-shadow: 0 0 0 4px rgba(22, 114, 241, 0.12);
      }

      .field input[readonly] {
        background: rgba(248, 251, 255, 0.95);
        color: rgba(11, 18, 32, 0.86);
      }

      .form-actions {
        display: flex;
        justify-content: flex-end;
        gap: 10px;
        flex-wrap: wrap;
        margin-top: 6px;
      }

      .secondary-btn,
      .primary-btn {
        min-height: 46px;
        padding: 0 18px;
        border-radius: 999px;
        border: 0;
        cursor: pointer;
        font-weight: 800;
        transition: transform 0.18s ease, opacity 0.18s ease;
      }

      .secondary-btn {
        background: rgba(15, 23, 42, 0.08);
        color: var(--text);
      }

      .primary-btn {
        background: linear-gradient(135deg, var(--nav-deep), var(--nav));
        color: #fff;
        box-shadow: 0 14px 28px rgba(22, 114, 241, 0.24);
      }

      .secondary-btn:hover,
      .primary-btn:hover {
        transform: translateY(-1px);
      }

      .toast {
        position: fixed;
        left: 50%;
        bottom: 22px;
        z-index: 50;
        transform: translateX(-50%);
        padding: 12px 16px;
        border-radius: 999px;
        background: rgba(11, 18, 32, 0.94);
        color: #fff;
        box-shadow: var(--shadow);
        font-size: 0.95rem;
        white-space: nowrap;
      }

      .toast[hidden] {
        display: none;
      }

      .state-note {
        color: var(--muted);
        font-size: 0.92rem;
      }

      @media (max-width: 1100px) {
        .kanban {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }

      @media (max-width: 920px) {
        .workspace {
          grid-template-columns: 1fr;
        }

        .sidebar {
          order: 2;
        }

        .board {
          order: 1;
        }
      }

      @media (max-width: 640px) {
        .topbar {
          flex-direction: column;
          align-items: flex-start;
        }

        .top-actions {
          width: 100%;
          justify-content: space-between;
        }

        .action-btn {
          flex: 1 1 auto;
        }

        .workspace {
          padding: 12px;
          gap: 12px;
        }

        .kanban {
          grid-template-columns: 1fr;
        }

        .board-head {
          flex-direction: column;
        }

        .project-toolbar {
          width: 100%;
          align-items: stretch;
        }

        .project-actions {
          width: 100%;
          justify-content: flex-start;
        }

        .board-nav {
          width: 100%;
          gap: 14px;
        }

        .task-card-head {
          flex-direction: column;
        }

        .code-pill {
          align-self: flex-start;
        }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <header class="topbar">
        <a class="home-link" href="dashboard.html" aria-label="MiniJira Home">
          <span class="home-mark" aria-hidden="true"></span>
          <span>MiniJira Home</span>
        </a>

        <div class="top-actions" aria-label="dashboard actions">
          <button class="action-btn" id="create-space-btn" type="button">Create Space</button>
          <button class="action-btn" id="create-task-btn" type="button">Create Task</button>
          <img class="account" id="account-image" src="user.png" alt="User account">
          <button class="icon-btn" id="logout-btn" type="button" aria-label="Logout">
            <img src="switch.png" alt="" aria-hidden="true">
          </button>
        </div>
      </header>

      <main class="workspace">
        <aside class="panel sidebar" aria-label="Spaces sidebar">
          <div class="sidebar-head">
            <h2 class="sidebar-title">Spaces</h2>
            <span class="space-count" id="space-count">0</span>
          </div>
          <div class="space-list" id="space-list">
            <div class="space-empty">No spaces yet. Create your first space.</div>
          </div>
        </aside>

        <section class="panel board" aria-label="Kanban board">
          <div class="board-head">
            <div class="board-copy">
              <p class="board-kicker">Workspace</p>
              <h1 class="board-title" id="board-title">No Space</h1>
              <p class="board-meta" id="board-meta">Create a space to begin organizing tasks.</p>
            </div>
          </div>

          <nav class="board-nav" aria-label="Workspace navigation">
            <button class="board-nav-item active" type="button" data-board-section="board" aria-current="page">Board</button>
            <button class="board-nav-item" type="button" data-board-section="backlog">Backlog</button>
            <button class="board-nav-item" type="button" data-board-section="sprint-week">Sprint Week</button>
            <button class="board-nav-item" type="button" data-board-section="see-teams">See Teams</button>
            <button class="board-nav-item" type="button" data-board-section="space-info">Space Info</button>
          </nav>

          <div class="project-toolbar" aria-label="project actions">
            <div class="project-actions">
              <button class="project-btn" id="share-btn" type="button">Share</button>
              <button class="project-btn" id="see-teams-btn" type="button">See Teams</button>
              <button class="project-btn" id="backlog-btn" type="button">Backlog</button>
              <button class="project-btn" id="sprint-week-btn" type="button">Sprint Week</button>
              <button class="project-btn" id="add-member-btn" type="button">Add Member</button>
            </div>

            <div class="code-pill" id="board-key">------</div>
          </div>

          <div class="kanban">
            <article class="lane">
              <h3>Todo</h3>
              <div class="task-list" id="task-list-todo">
                <div class="lane-empty">No tasks yet</div>
              </div>
            </article>
            <article class="lane">
              <h3>In Progress</h3>
              <div class="task-list" id="task-list-in-progress">
                <div class="lane-empty">No tasks yet</div>
              </div>
            </article>
            <article class="lane">
              <h3>Review</h3>
              <div class="task-list" id="task-list-review">
                <div class="lane-empty">No tasks yet</div>
              </div>
            </article>
            <article class="lane">
              <h3>Done</h3>
              <div class="task-list" id="task-list-done">
                <div class="lane-empty">No tasks yet</div>
              </div>
            </article>
          </div>
        </section>
      </main>
    </div>

    <div class="modal" id="space-modal" hidden>
      <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="space-modal-title">
        <div class="modal-head">
          <h2 id="space-modal-title">Create Space</h2>
          <button class="close-btn" id="close-space-modal" type="button" aria-label="Close">X</button>
        </div>

        <form class="space-form" id="space-form">
          <div class="field">
            <label for="project-name">Project name</label>
            <input id="project-name" name="project-name" type="text" placeholder="Enter project name" required maxlength="60">
          </div>

          <div class="field">
            <label for="project-key">Project key</label>
            <input id="project-key" name="project-key" type="text" readonly>
          </div>

          <div class="form-actions">
            <button class="secondary-btn" id="cancel-space" type="button">Cancel</button>
            <button class="primary-btn" id="submit-space" type="submit">Create Space</button>
          </div>
        </form>
      </div>
    </div>

    <div class="modal" id="task-modal" hidden>
      <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="task-modal-title">
        <div class="modal-head">
          <h2 id="task-modal-title">Create Task</h2>
          <button class="close-btn" id="close-task-modal" type="button" aria-label="Close">X</button>
        </div>

        <form class="space-form" id="task-form">
          <div class="field">
            <label for="task-name">Task name</label>
            <input id="task-name" name="task-name" type="text" placeholder="Enter task name" required maxlength="80">
          </div>

          <div class="field">
            <label for="task-space">Space</label>
            <select id="task-space" name="task-space" required></select>
          </div>

          <div class="field">
            <label for="task-issue-tag">Issue tag</label>
            <select id="task-issue-tag" name="task-issue-tag" required>
              <option value="task">Task</option>
              <option value="story">Story</option>
              <option value="epic">Epic</option>
            </select>
          </div>

          <div class="field">
            <label for="task-priority">Priority</label>
            <select id="task-priority" name="task-priority" required>
              <option value="low">Low</option>
              <option value="medium" selected>Medium</option>
              <option value="high">High</option>
            </select>
          </div>

          <div class="field">
            <label for="task-status">Status</label>
            <select id="task-status" name="task-status" required>
              <option value="todo">Todo</option>
              <option value="in-progress">In Progress</option>
              <option value="review">Review</option>
              <option value="done">Done</option>
            </select>
          </div>

          <div class="field">
            <label for="task-assignee">Assignee</label>
            <input id="task-assignee" name="task-assignee" type="text" placeholder="MiniJira user name or email">
          </div>

          <div class="form-actions">
            <button class="secondary-btn" id="cancel-task" type="button">Cancel</button>
            <button class="primary-btn" id="submit-task" type="submit">Create Task</button>
          </div>
        </form>
      </div>
    </div>

    <div class="toast" id="toast" hidden></div>

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-app.js";
      import {
        getAuth,
        onAuthStateChanged,
        signOut
      } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-auth.js";
      import {
        collection,
        collectionGroup,
        addDoc,
        doc,
        deleteDoc,
        getDoc,
        getDocs,
        getFirestore,
        onSnapshot,
        query,
        where,
        setDoc,
        serverTimestamp
      } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-firestore.js";

      const firebaseConfig = {
        apiKey: "AIzaSyC5tCamhw8qGI4apSurMZpXimwsMP4D9AI",
        authDomain: "minijiratask.firebaseapp.com",
        projectId: "minijiratask",
        storageBucket: "minijiratask.firebasestorage.app",
        messagingSenderId: "378857537733",
        appId: "1:378857537733:web:0cf3cac222a9951c3fb0ac"
      };

      const app = initializeApp(firebaseConfig);
      const auth = getAuth(app);
      const db = getFirestore(app);

      const accountImage = document.getElementById("account-image");
      const logoutBtn = document.getElementById("logout-btn");
      const createSpaceBtn = document.getElementById("create-space-btn");
      const createTaskBtn = document.getElementById("create-task-btn");
      const shareBtn = document.getElementById("share-btn");
      const seeTeamsBtn = document.getElementById("see-teams-btn");
      const backlogBtn = document.getElementById("backlog-btn");
      const sprintWeekBtn = document.getElementById("sprint-week-btn");
      const addMemberBtn = document.getElementById("add-member-btn");
      const spaceCount = document.getElementById("space-count");
      const spaceList = document.getElementById("space-list");
      const boardTitle = document.getElementById("board-title");
      const boardMeta = document.getElementById("board-meta");
      const boardKey = document.getElementById("board-key");
      const spaceModal = document.getElementById("space-modal");
      const closeSpaceModal = document.getElementById("close-space-modal");
      const cancelSpace = document.getElementById("cancel-space");
      const spaceForm = document.getElementById("space-form");
      const projectNameInput = document.getElementById("project-name");
      const projectKeyInput = document.getElementById("project-key");
      const submitSpace = document.getElementById("submit-space");
      const taskModal = document.getElementById("task-modal");
      const closeTaskModalBtn = document.getElementById("close-task-modal");
      const cancelTask = document.getElementById("cancel-task");
      const taskForm = document.getElementById("task-form");
      const taskNameInput = document.getElementById("task-name");
      const taskSpaceInput = document.getElementById("task-space");
      const taskIssueTagInput = document.getElementById("task-issue-tag");
      const taskPriorityInput = document.getElementById("task-priority");
      const taskStatusInput = document.getElementById("task-status");
      const taskAssigneeInput = document.getElementById("task-assignee");
      const submitTask = document.getElementById("submit-task");
      const taskLaneTodo = document.getElementById("task-list-todo");
      const taskLaneInProgress = document.getElementById("task-list-in-progress");
      const taskLaneReview = document.getElementById("task-list-review");
      const taskLaneDone = document.getElementById("task-list-done");
      const toast = document.getElementById("toast");
      const boardNavButtons = Array.from(document.querySelectorAll("[data-board-section]"));

      let currentUser = null;
      let nestedSpacesUnsubscribe = null;
      let legacySpacesUnsubscribe = null;
      let tasksUnsubscribe = null;
      let nestedSpaces = [];
      let legacySpaces = [];
      let spaces = [];
      let tasks = [];
      let selectedSpaceKey = null;
      let currentTasksSpaceKey = null;
      let activeBoardSection = "board";
      let toastTimer = null;

      function showToast(message) {
        toast.textContent = message;
        toast.hidden = false;

        if (toastTimer) {
          window.clearTimeout(toastTimer);
        }

        toastTimer = window.setTimeout(() => {
          toast.hidden = true;
        }, 2400);
      }

      function setActiveBoardSection(section) {
        activeBoardSection = section;

        for (const button of boardNavButtons) {
          const isActive = button.dataset.boardSection === section;
          button.classList.toggle("active", isActive);

          if (isActive) {
            button.setAttribute("aria-current", "page");
          } else {
            button.removeAttribute("aria-current");
          }
        }
      }

      function generateKey() {
        const value = Math.floor(Math.random() * 1000000);
        return String(value).padStart(6, "0");
      }

      function openSpaceModal() {
        spaceForm.reset();
        projectKeyInput.value = generateKey();
        spaceModal.hidden = false;
        window.setTimeout(() => projectNameInput.focus(), 0);
      }

      function closeModal() {
        spaceModal.hidden = true;
        spaceForm.reset();
      }

      function getSelectedSpace() {
        return spaces.find((space) => space.key === selectedSpaceKey) || null;
      }

      function requireSelectedSpace(fallbackMessage = "Create a space first.") {
        const space = getSelectedSpace();
        if (!space) {
          showToast(fallbackMessage);
          return null;
        }

        return space;
      }

      function spaceKeyFromDoc(spaceDoc, fallbackOwnerUid) {
        const ownerUid = spaceDoc.ownerUid || fallbackOwnerUid || "unknown";
        return `${ownerUid}:${spaceDoc.id}`;
      }

      function normalizeSpaceDoc(spaceDoc, fallbackOwnerUid) {
        const ownerUid = spaceDoc.ownerUid || fallbackOwnerUid || "unknown";

        return {
          ...spaceDoc,
          ownerUid,
          key: spaceKeyFromDoc(spaceDoc, ownerUid)
        };
      }

      function syncSpaces() {
        const merged = new Map();

        for (const space of [...legacySpaces, ...nestedSpaces]) {
          merged.set(space.key, space);
        }

        spaces = Array.from(merged.values()).sort(
          (a, b) => (b.clientCreatedAt || 0) - (a.clientCreatedAt || 0)
        );

        if (spaces.length && !spaces.some((space) => space.key === selectedSpaceKey)) {
          selectedSpaceKey = spaces[0].key;
        }

        if (!spaces.length) {
          selectedSpaceKey = null;
        }

        renderTaskSpaceOptions();
        renderWorkspace();
      }

      function updateNestedSpaces(nextSpaces) {
        nestedSpaces = nextSpaces;
        syncSpaces();
      }

      function updateLegacySpaces(nextSpaces) {
        legacySpaces = nextSpaces;
        syncSpaces();
      }

      async function migrateLegacySpaces(uid) {
        const legacyQueryRef = query(
          collection(db, "spaces"),
          where("memberUids", "array-contains", uid)
        );
        const legacySnapshot = await getDocs(legacyQueryRef);

        for (const legacyDoc of legacySnapshot.docs) {
          const legacyData = legacyDoc.data();
          const ownerUid = legacyData.ownerUid || uid;

          if (ownerUid !== uid) {
            continue;
          }

          const nextSpaceRef = doc(db, "users", ownerUid, "spaces", legacyDoc.id);
          const nextSpaceSnap = await getDoc(nextSpaceRef);

          if (!nextSpaceSnap.exists()) {
            await setDoc(nextSpaceRef, legacyData);
          }

          const legacyTasksSnapshot = await getDocs(
            collection(db, "spaces", legacyDoc.id, "tasks")
          );

          for (const legacyTaskDoc of legacyTasksSnapshot.docs) {
            await setDoc(
              doc(db, "users", ownerUid, "spaces", legacyDoc.id, "tasks", legacyTaskDoc.id),
              legacyTaskDoc.data()
            );
            await deleteDoc(legacyTaskDoc.ref);
          }

          await deleteDoc(legacyDoc.ref);
        }
      }

      async function shareSelectedSpace() {
        const space = requireSelectedSpace();
        if (!space) {
          return;
        }

        const shareText = [
          `miniJira space: ${space.projectName || "Untitled space"}`,
          `Project key: ${space.projectKey || "------"}`
        ].join("\n");

        try {
          await navigator.clipboard.writeText(shareText);
          showToast("Project details copied to clipboard.");
        } catch (error) {
          console.error(error);
          showToast("Could not copy, but the project key is shown above.");
        }
      }

      function showComingSoonAction(label) {
        const space = requireSelectedSpace();
        if (!space) {
          return;
        }

        showToast(`${label} for "${space.projectName || "Untitled space"}" is coming next.`);
      }

      function showTeamSummary() {
        const space = requireSelectedSpace();
        if (!space) {
          return;
        }

        const count = Array.isArray(space.memberUids) ? space.memberUids.length : 0;
        showToast(`${count} team member${count === 1 ? "" : "s"} in this space.`);
      }

      function normalizeTaskStatus(value) {
        const status = String(value || "todo").toLowerCase();

        if (status === "in progress" || status === "in_progress") {
          return "in-progress";
        }

        if (status === "todo" || status === "in-progress" || status === "review" || status === "done") {
          return status;
        }

        return "todo";
      }

      function normalizeTaskPriority(value) {
        const priority = String(value || "medium").toLowerCase();

        if (priority === "low" || priority === "medium" || priority === "high") {
          return priority;
        }

        return "medium";
      }

      function renderTaskSpaceOptions() {
        if (!taskSpaceInput) {
          return;
        }

        const desiredValue = taskSpaceInput.value || selectedSpaceKey || (spaces[0] && spaces[0].key) || "";

        taskSpaceInput.replaceChildren();

        if (!spaces.length) {
          const option = document.createElement("option");
          option.value = "";
          option.textContent = "Create a space first";
          option.selected = true;
          taskSpaceInput.appendChild(option);
          taskSpaceInput.disabled = true;
          return;
        }

        taskSpaceInput.disabled = false;

        for (const space of spaces) {
          const option = document.createElement("option");
          option.value = space.key;
          option.textContent = `${space.projectName || "Untitled space"}${space.projectKey ? ` - ${space.projectKey}` : ""}`;
          taskSpaceInput.appendChild(option);
        }

        if (spaces.some((space) => space.key === desiredValue)) {
          taskSpaceInput.value = desiredValue;
        } else {
          taskSpaceInput.value = spaces[0].key;
        }
      }

      function getTaskLaneElement(status) {
        const normalizedStatus = normalizeTaskStatus(status);

        if (normalizedStatus === "in-progress") {
          return taskLaneInProgress;
        }

        if (normalizedStatus === "review") {
          return taskLaneReview;
        }

        if (normalizedStatus === "done") {
          return taskLaneDone;
        }

        return taskLaneTodo;
      }

      function openTaskModal() {
        if (!spaces.length) {
          showToast("Create a space first.");
          return;
        }

        taskForm.reset();
        renderTaskSpaceOptions();
        taskSpaceInput.value = selectedSpaceKey && spaces.some((space) => space.key === selectedSpaceKey)
          ? selectedSpaceKey
          : spaces[0].key;
        taskStatusInput.value = "todo";
        taskPriorityInput.value = "medium";
        taskModal.hidden = false;
        window.setTimeout(() => taskNameInput.focus(), 0);
      }

      function closeTaskModal() {
        taskModal.hidden = true;
        taskForm.reset();
      }

      function renderTasks() {
        const grouped = {
          todo: [],
          "in-progress": [],
          review: [],
          done: []
        };

        for (const task of tasks) {
          grouped[normalizeTaskStatus(task.status)].push(task);
        }

        const laneMap = [
          ["todo", taskLaneTodo],
          ["in-progress", taskLaneInProgress],
          ["review", taskLaneReview],
          ["done", taskLaneDone]
        ];

        for (const [status, lane] of laneMap) {
          lane.replaceChildren();

          const laneTasks = grouped[status];

          if (!laneTasks.length) {
            const empty = document.createElement("div");
            empty.className = "lane-empty";
            empty.textContent = "No tasks yet";
            lane.appendChild(empty);
            continue;
          }

          for (const task of laneTasks) {
            const card = document.createElement("article");
            card.className = "task-card";

            const head = document.createElement("div");
            head.className = "task-card-head";

            const title = document.createElement("h4");
            title.className = "task-card-title";
            title.textContent = task.taskName || "Untitled task";

            const tag = document.createElement("span");
            tag.className = "task-badge";
            tag.textContent = (task.issueTag || "task").toUpperCase();

            const priorityTag = document.createElement("span");
            const normalizedPriority = normalizeTaskPriority(task.priority);
            priorityTag.className = `task-badge priority-${normalizedPriority}`;
            priorityTag.textContent = normalizedPriority.toUpperCase();

            head.append(title, tag, priorityTag);

            const meta = document.createElement("div");
            meta.className = "task-meta";

            const priority = document.createElement("div");
            const priorityLabel = document.createElement("strong");
            priorityLabel.textContent = "Priority:";
            priority.append(priorityLabel, document.createTextNode(` ${normalizedPriority.toUpperCase()}`));

            const assignee = document.createElement("div");
            const assigneeLabel = document.createElement("strong");
            assigneeLabel.textContent = "Assignee:";
            assignee.append(assigneeLabel, document.createTextNode(` ${task.assignee || "Unassigned"}`));

            meta.append(priority, assignee);
            card.append(head, meta);
            lane.appendChild(card);
          }
        }
      }

      function startTasksListener(space) {
        if (tasksUnsubscribe) {
          tasksUnsubscribe();
          tasksUnsubscribe = null;
        }

        currentTasksSpaceKey = space ? space.key : null;
        tasks = [];
        renderTasks();

        if (!space) {
          return;
        }

        const taskRef = collection(db, "users", space.ownerUid || currentUser.uid, "spaces", space.id, "tasks");
        tasksUnsubscribe = onSnapshot(
          taskRef,
          { includeMetadataChanges: true },
          (snapshot) => {
            tasks = snapshot.docs
              .map((taskDoc) => ({ id: taskDoc.id, ...taskDoc.data() }))
              .sort((a, b) => (b.clientCreatedAt || 0) - (a.clientCreatedAt || 0));

            renderTasks();
          },
          (error) => {
            console.error("Task listener failed:", error);
            showToast("Could not load tasks from Firebase.");
          }
        );
      }

      function renderSpaces() {
        spaceCount.textContent = String(spaces.length);
        spaceList.replaceChildren();

        if (!spaces.length) {
          const empty = document.createElement("div");
          empty.className = "space-empty";
          empty.textContent = "No spaces yet. Create your first space.";
          spaceList.appendChild(empty);
          return;
        }

        for (const space of spaces) {
          const item = document.createElement("button");
          item.type = "button";
          item.className = `space-item${space.key === selectedSpaceKey ? " active" : ""}`;

          const info = document.createElement("span");
          const title = document.createElement("strong");
          title.textContent = space.projectName || "Untitled space";
          const key = document.createElement("span");
          key.textContent = space.projectKey ? `Key ${space.projectKey}` : "No key";
          info.append(title, key);

          const action = document.createElement("span");
          action.textContent = "Open";

          item.append(info, action);
          item.addEventListener("click", () => {
            selectedSpaceKey = space.key;
            renderSpaces();
            renderBoard();
          });

          spaceList.appendChild(item);
        }
      }

      function renderBoard() {
        const space = getSelectedSpace();

        if (!space) {
          boardTitle.textContent = "No Space";
          boardMeta.textContent = "Create a space to begin organizing tasks.";
          boardKey.textContent = "------";
          startTasksListener(null);
          return;
        }

        boardTitle.textContent = space.projectName || "Untitled space";
        boardMeta.textContent = `Project key ${space.projectKey} - ready for kanban tasks.`;
        boardKey.textContent = space.projectKey || "------";
        startTasksListener(space);
      }

      function renderWorkspace() {
        renderSpaces();
        renderBoard();
      }

      async function createSpace(projectName, projectKey) {
        const payload = {
          projectName,
          projectKey,
          ownerUid: currentUser.uid,
          memberUids: [currentUser.uid],
          createdAt: serverTimestamp(),
          updatedAt: serverTimestamp(),
          clientCreatedAt: Date.now()
        };

        const ref = await addDoc(collection(db, "users", currentUser.uid, "spaces"), payload);

        return {
          id: ref.id,
          path: ref.path,
          key: `${currentUser.uid}:${ref.id}`,
          ...payload
        };
      }

      function startSpacesListener(uid) {
        if (nestedSpacesUnsubscribe) {
          nestedSpacesUnsubscribe();
        }

        if (legacySpacesUnsubscribe) {
          legacySpacesUnsubscribe();
          legacySpacesUnsubscribe = null;
        }

        legacySpaces = [];

        const nestedQueryRef = collection(db, "users", uid, "spaces");
        nestedSpacesUnsubscribe = onSnapshot(
          nestedQueryRef,
          { includeMetadataChanges: true },
          (snapshot) => {
            const nextSpaces = snapshot.docs
              .map((spaceDoc) =>
                normalizeSpaceDoc(
                  {
                    id: spaceDoc.id,
                    path: spaceDoc.ref.path,
                    ...spaceDoc.data()
                  },
                  uid
                )
              )
              .sort((a, b) => (b.clientCreatedAt || 0) - (a.clientCreatedAt || 0));

            nestedSpaces = nextSpaces;
            syncSpaces();
          },
          (error) => {
            console.error("Space listener failed:", error);
            showToast("Could not load spaces from Firebase.");
          }
        );
      }

      onAuthStateChanged(auth, (user) => {
        if (!user) {
          window.location.replace("index.html");
          return;
        }

        currentUser = user;
        accountImage.src = "user.png";
        accountImage.alt = user.displayName ? `${user.displayName} account image` : "User account";
        startSpacesListener(user.uid);
        void migrateLegacySpaces(user.uid).catch((error) => {
          console.warn("Legacy space migration skipped:", error);
        });
      });

      createSpaceBtn.addEventListener("click", openSpaceModal);

      createTaskBtn.addEventListener("click", () => {
        openTaskModal();
      });

      shareBtn.addEventListener("click", shareSelectedSpace);

      seeTeamsBtn.addEventListener("click", showTeamSummary);

      backlogBtn.addEventListener("click", () => {
        showComingSoonAction("Backlog");
      });

      sprintWeekBtn.addEventListener("click", () => {
        showComingSoonAction("Sprint Week");
      });

      addMemberBtn.addEventListener("click", () => {
        showComingSoonAction("Add member");
      });

      for (const button of boardNavButtons) {
        button.addEventListener("click", () => {
          setActiveBoardSection(button.dataset.boardSection || "board");

          if (button.dataset.boardSection === "board") {
            renderBoard();
            return;
          }

          if (button.dataset.boardSection === "see-teams") {
            showTeamSummary();
            return;
          }

          if (button.dataset.boardSection === "space-info") {
            const space = requireSelectedSpace();
            if (!space) {
              return;
            }

            showToast(`${space.projectName || "Untitled space"} - Key ${space.projectKey || "------"}`);
            return;
          }

          showComingSoonAction(button.textContent.trim());
        });
      }

      closeSpaceModal.addEventListener("click", closeModal);
      cancelSpace.addEventListener("click", closeModal);

      closeTaskModalBtn.addEventListener("click", closeTaskModal);
      cancelTask.addEventListener("click", closeTaskModal);

      spaceModal.addEventListener("click", (event) => {
        if (event.target === spaceModal) {
          closeModal();
        }
      });

      taskModal.addEventListener("click", (event) => {
        if (event.target === taskModal) {
          closeTaskModal();
        }
      });

      window.addEventListener("keydown", (event) => {
        if (event.key === "Escape" && !spaceModal.hidden) {
          closeModal();
        }

        if (event.key === "Escape" && !taskModal.hidden) {
          closeTaskModal();
        }
      });

      spaceForm.addEventListener("submit", async (event) => {
        event.preventDefault();

        if (!currentUser) {
          return;
        }

        const projectName = projectNameInput.value.trim();

        if (!projectName) {
          showToast("Please enter a project name.");
          projectNameInput.focus();
          return;
        }

        submitSpace.disabled = true;

        try {
          const projectKey = projectKeyInput.value || generateKey();
          projectKeyInput.value = projectKey;
          const createdSpace = await createSpace(projectName, projectKey);

          selectedSpaceKey = createdSpace.key;
          nestedSpaces = [
            createdSpace,
            ...nestedSpaces.filter((space) => space.key !== createdSpace.key)
          ];
          syncSpaces();
          closeModal();
          showToast(`Space "${projectName}" created.`);
        } catch (error) {
          console.error(error);
          showToast("Could not create this space right now.");
        } finally {
          submitSpace.disabled = false;
        }
      });

      taskForm.addEventListener("submit", async (event) => {
        event.preventDefault();

        if (!currentUser) {
          return;
        }

        const space = getSelectedSpace();

        if (!space) {
          showToast("Create a space first.");
          return;
        }

        const taskName = taskNameInput.value.trim();

        if (!taskName) {
          showToast("Please enter a task name.");
          taskNameInput.focus();
          return;
        }

        const payload = {
          taskName,
          issueTag: taskIssueTagInput.value,
          priority: taskPriorityInput.value,
          status: normalizeTaskStatus(taskStatusInput.value),
          assignee: taskAssigneeInput.value.trim(),
          spaceId: space.id,
          spaceKey: space.projectKey || "",
          spaceName: space.projectName || "",
          ownerUid: currentUser.uid,
          createdByUid: currentUser.uid,
          createdAt: serverTimestamp(),
          updatedAt: serverTimestamp(),
          clientCreatedAt: Date.now()
        };

        submitTask.disabled = true;

        try {
          await addDoc(
            collection(db, "users", space.ownerUid || currentUser.uid, "spaces", space.id, "tasks"),
            payload
          );
          closeTaskModal();
          showToast(`Task "${taskName}" created.`);
        } catch (error) {
          console.error(error);
          showToast("Could not create this task right now.");
        } finally {
          submitTask.disabled = false;
        }
      });

      logoutBtn.addEventListener("click", async () => {
        logoutBtn.disabled = true;

        try {
          await signOut(auth);
          window.location.replace("index.html");
        } catch (error) {
          console.error(error);
          showToast("Could not sign out right now.");
          logoutBtn.disabled = false;
        }
      });

      setActiveBoardSection("board");
      renderWorkspace();
    </script>
  </body>
</html>
