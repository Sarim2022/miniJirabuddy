<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="miniJira dashboard">
    <title>miniJira Home</title>
    <style>
      :root {
        color-scheme: light;
        --nav: #1976f3;
        --nav-dark: #165fc1;
        --nav-soft: rgba(255, 255, 255, 0.16);
        --text: #0d1a2b;
        --muted: rgba(13, 26, 43, 0.65);
        --surface: rgba(255, 255, 255, 0.68);
        --border: rgba(15, 30, 55, 0.08);
        --shadow: 0 20px 50px rgba(15, 30, 55, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        min-height: 100%;
      }

      body {
        margin: 0;
        min-height: 100svh;
        font-family: "Avenir Next", "Segoe UI", "Trebuchet MS", sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at top left, rgba(255, 255, 255, 0.95), rgba(248, 251, 255, 0.96) 42%, #eef5ff 100%);
      }

      .app {
        min-height: 100svh;
        display: grid;
        grid-template-rows: auto 1fr;
      }

      .topbar {
        height: 78px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        padding: 0 clamp(16px, 3vw, 32px);
        background: linear-gradient(90deg, var(--nav-dark), var(--nav));
        color: #fff;
        box-shadow: 0 10px 28px rgba(25, 118, 243, 0.24);
        position: sticky;
        top: 0;
        z-index: 5;
      }

      .home-link {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        color: #fff;
        text-decoration: none;
        font-weight: 800;
        font-size: 1.08rem;
        letter-spacing: 0.01em;
        white-space: nowrap;
      }

      .home-dot {
        width: 12px;
        height: 12px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.95);
        box-shadow: 0 0 0 6px rgba(255, 255, 255, 0.16);
      }

      .actions {
        display: flex;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
        justify-content: flex-end;
      }

      .action-btn,
      .icon-btn {
        border: 0;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 44px;
        cursor: pointer;
        transition: transform 0.18s ease, background 0.18s ease, opacity 0.18s ease;
      }

      .action-btn {
        padding: 0 16px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.14);
        color: #fff;
        font-weight: 700;
        letter-spacing: 0.01em;
        border: 1px solid rgba(255, 255, 255, 0.1);
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.08);
      }

      .action-btn:hover,
      .icon-btn:hover {
        transform: translateY(-1px);
        background: rgba(255, 255, 255, 0.22);
      }

      .icon-btn {
        width: 46px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.12);
        border: 1px solid rgba(255, 255, 255, 0.1);
      }

      .icon-btn img {
        width: 22px;
        height: 22px;
        display: block;
        object-fit: contain;
      }

      .account {
        width: 46px;
        height: 46px;
        border-radius: 50%;
        object-fit: cover;
        border: 2px solid rgba(255, 255, 255, 0.88);
        background: rgba(255, 255, 255, 0.18);
        box-shadow: 0 8px 18px rgba(0, 0, 0, 0.18);
      }

      .main {
        display: grid;
        place-items: center;
        padding: clamp(20px, 4vw, 48px);
      }

      .empty-state {
        width: min(880px, 100%);
        min-height: min(58svh, 560px);
        display: grid;
        place-items: center;
        border: 1px solid var(--border);
        border-radius: 34px;
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.96), rgba(246, 250, 255, 0.92)),
          var(--surface);
        box-shadow: var(--shadow);
      }

      .empty-copy {
        text-align: center;
        padding: 20px;
      }

      .empty-copy h1 {
        margin: 0;
        font-size: clamp(2.5rem, 7vw, 5rem);
        line-height: 1;
        letter-spacing: -0.07em;
        font-weight: 900;
        color: #050505;
      }

      .empty-copy p {
        margin: 12px 0 0;
        color: var(--muted);
        font-size: 1rem;
        line-height: 1.6;
      }

      @media (max-width: 820px) {
        .topbar {
          height: auto;
          padding-top: 14px;
          padding-bottom: 14px;
          align-items: flex-start;
        }

        .actions {
          justify-content: flex-start;
        }
      }

      @media (max-width: 640px) {
        .topbar {
          flex-direction: column;
          align-items: flex-start;
          gap: 12px;
        }

        .actions {
          width: 100%;
          justify-content: space-between;
        }

        .action-btn {
          flex: 1 1 auto;
        }

        .account,
        .icon-btn {
          flex: 0 0 auto;
        }

        .main {
          padding: 14px;
        }

        .empty-state {
          min-height: calc(100svh - 152px);
          border-radius: 26px;
        }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <header class="topbar">
        <a class="home-link" href="dashboard.html" aria-label="MiniJira Home">
          <span class="home-dot" aria-hidden="true"></span>
          <span>MiniJira Home</span>
        </a>

        <div class="actions" aria-label="dashboard actions">
          <button class="action-btn" id="create-space-btn" type="button">Create Space</button>
          <button class="action-btn" id="create-task-btn" type="button">Create Task</button>
          <img class="account" id="account-image" src="user.png" alt="User account">
          <button class="icon-btn" id="logout-btn" type="button" aria-label="Logout">
            <img src="switch.png" alt="" aria-hidden="true">
          </button>
        </div>
      </header>

      <main class="main">
        <section class="empty-state" aria-label="Home empty state">
          <div class="empty-copy">
            <h1>No Space</h1>
            <p>Your miniJira home is ready. Create a space to begin organizing work.</p>
          </div>
        </section>
      </main>
    </div>

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-app.js";
      import {
        getAuth,
        onAuthStateChanged,
        signOut
      } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-auth.js";

      const firebaseConfig = {
        apiKey: "AIzaSyC5tCamhw8qGI4apSurMZpXimwsMP4D9AI",
        authDomain: "minijiratask.firebaseapp.com",
        projectId: "minijiratask",
        storageBucket: "minijiratask.firebasestorage.app",
        messagingSenderId: "378857537733",
        appId: "1:378857537733:web:0cf3cac222a9951c3fb0ac"
      };

      const app = initializeApp(firebaseConfig);
      const auth = getAuth(app);

      const accountImage = document.getElementById("account-image");
      const logoutBtn = document.getElementById("logout-btn");

      function syncUser(user) {
        accountImage.src = "user.png";
        accountImage.alt = user.displayName ? `${user.displayName} account image` : "User account";
      }

      onAuthStateChanged(auth, (user) => {
        if (!user) {
          window.location.href = "index.html";
          return;
        }

        syncUser(user);
      });

      logoutBtn.addEventListener("click", async () => {
        logoutBtn.disabled = true;

        try {
          await signOut(auth);
          window.location.href = "index.html";
        } catch (error) {
          console.error(error);
          logoutBtn.disabled = false;
        }
      });
    </script>
  </body>
</html>
