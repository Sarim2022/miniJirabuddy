<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="miniJira dashboard">
    <title>miniJira Home</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <div class="app" id="app-shell">
      <div class="sidebar-overlay" id="sidebar-overlay" hidden></div>

      <header class="topbar">
        <div class="topbar-left">
          <button
            class="sidebar-toggle"
            id="sidebar-toggle"
            type="button"
            aria-label="Open spaces drawer"
            aria-controls="spaces-sidebar"
            aria-expanded="false"
          >
            <span></span>
            <span></span>
            <span></span>
          </button>

          <a class="home-link" href="dashboard.html" aria-label="MiniJira Home">
            <span class="home-mark" aria-hidden="true"></span>
            <span>MiniJira Home</span>
          </a>
        </div>

        <div class="topbar-actions" aria-label="dashboard actions">
          <button class="top-btn top-btn--outline" id="create-space-btn" type="button">Create Project</button>
          <button class="top-btn top-btn--solid" id="create-task-btn" type="button">Create Task</button>
          <img class="account" id="account-image" src="user.png" alt="User account">
          <button class="icon-btn" id="logout-btn" type="button" aria-label="Logout">
            <img src="switch.png" alt="" aria-hidden="true">
          </button>
        </div>
      </header>

      <main class="shell">
        <aside class="panel sidebar" id="spaces-sidebar" aria-label="Spaces sidebar">
          <div class="sidebar-head">
            <div>
              <p class="section-label">Projects</p>
              <p class="sidebar-copy">Select a project to open its board.</p>
            </div>
            <span class="space-count" id="space-count">0</span>
          </div>

          <div class="space-list" id="space-list">
            <div class="space-empty">No projects yet. Create your first project.</div>
          </div>
        </aside>

        <section class="panel workspace" aria-label="Workspace">
          <div class="workspace-header">
            <div class="workspace-copy">
              <p class="workspace-kicker">Workspace</p>
              <h1 class="workspace-title" id="board-title">No Space</h1>
              <p class="workspace-meta" id="board-meta">Create a space to begin organizing tasks.</p>
            </div>
            <div class="code-pill" id="board-key">------</div>
          </div>

          <nav class="board-nav" aria-label="Workspace navigation">
            <button class="board-nav-item active" type="button" data-board-section="board" aria-current="page">Board</button>
            <button class="board-nav-item" type="button" data-board-section="backlog">Backlog</button>
            <button class="board-nav-item" type="button" data-board-section="sprint-week">Sprint Week</button>
            <button class="board-nav-item" type="button" data-board-section="see-teams">See Teams</button>
            <button class="board-nav-item" type="button" data-board-section="space-info">Space Info</button>
            <button class="board-nav-item" type="button" data-board-section="members">Members</button>
            <button class="board-nav-item" type="button" data-board-section="see-all-work">See All Work</button>
          </nav>

          <div class="workspace-content" id="workspace-content"></div>
        </section>
      </main>
    </div>

    <div class="modal" id="space-modal" hidden>
      <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="space-modal-title">
        <div class="modal-head">
          <h2 id="space-modal-title">Create Project</h2>
          <button class="close-btn" id="close-space-modal" type="button" aria-label="Close">X</button>
        </div>

        <form class="space-form" id="space-form">
          <div class="field">
            <label for="project-name">Project name</label>
            <input id="project-name" name="project-name" type="text" placeholder="Enter project name" required maxlength="60">
          </div>

          <div class="field">
            <label for="project-key">Project code</label>
            <input id="project-key" name="project-key" type="text" readonly>
          </div>

          <div class="form-actions">
            <button class="secondary-btn" id="cancel-space" type="button">Cancel</button>
            <button class="primary-btn" id="submit-space" type="submit">Create Project</button>
          </div>
        </form>
      </div>
    </div>

    <div class="modal" id="task-modal" hidden>
      <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="task-modal-title">
        <div class="modal-head">
          <h2 id="task-modal-title">Create Task</h2>
          <button class="close-btn" id="close-task-modal" type="button" aria-label="Close">X</button>
        </div>

        <form class="space-form" id="task-form">
          <div class="field">
            <label for="task-name">Title</label>
            <input id="task-name" name="task-name" type="text" placeholder="Enter task title" required maxlength="80">
          </div>

          <div class="field">
            <label for="task-description">Description</label>
            <textarea id="task-description" name="task-description" rows="4" placeholder="Add detailed notes about the task"></textarea>
          </div>

          <div class="field">
            <label for="task-status">Status</label>
            <select id="task-status" name="task-status" required>
              <option value="todo">Todo</option>
              <option value="progress">Progress</option>
              <option value="done">Done</option>
            </select>
          </div>

          <div class="field">
            <label for="task-assignee">Assignee email</label>
            <input id="task-assignee" name="task-assignee" type="email" placeholder="teammate@example.com" autocomplete="email">
            <p class="field-hint" id="task-assignee-status" aria-live="polite"></p>
          </div>

          <div class="form-actions">
            <button class="secondary-btn" id="cancel-task" type="button">Cancel</button>
            <button class="primary-btn" id="submit-task" type="submit">Create Task</button>
          </div>
        </form>
      </div>
    </div>

    <div class="toast" id="toast" hidden></div>

    <script type="module" src="script.js"></script>
  </body>
</html>
