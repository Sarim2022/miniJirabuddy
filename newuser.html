<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="miniJira new user screen">
    <title>new user</title>
    <style>
      * {
        box-sizing: border-box;
      }

      html,
      body {
        min-height: 100%;
      }

      body {
        margin: 0;
        min-height: 100svh;
        display: grid;
        place-items: center;
        background: #000000;
        color: #ffffff;
        font-family: "Avenir Next", "Segoe UI", "Trebuchet MS", sans-serif;
      }

      h1 {
        margin: 0;
        font-size: clamp(2.6rem, 7vw, 6rem);
        line-height: 1;
        letter-spacing: -0.06em;
        text-transform: lowercase;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>new user</h1>
    </main>
  </body>
</html>
